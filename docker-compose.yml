version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: karimvarela_db
    environment:
      POSTGRES_USER: karimvarela
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: karimvarela_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U karimvarela -d karimvarela_db']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: karimvarela_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
